<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .container{
            width:100%;
            max-width:550px;
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:25px;
            font-size:40px;
            font-weight:bold;
        }

        form{
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 20px 40px rgba(0,0,0,0.25);
        }

        p{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#333;
            font-weight:600;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px 15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            transition:0.3s;
            outline:none;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#4f46e5;
            box-shadow:0 0 8px rgba(79,70,229,0.3);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#4f46e5;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#3730a3;
            transform:translateY(-2px);
        }

        @media(max-width:600px){

            body{
                padding:20px;
            }

            h1{
                font-size:30px;
            }

            form{
                padding:25px;
            }
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Student Registration Form</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
