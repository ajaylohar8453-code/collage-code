<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form method="POST">
        {% csrf_token %}

        <p>
            Name:<br>
            <input type="text" name="name">
        </p>

        <p>
            Age:<br>
            <input type="number" name="age">
        </p>

        <p>
            Course:<br>
            <input type="text" name="course">
        </p>

        <button type="submit">Save</button>

    </form>

</body>
</html>
